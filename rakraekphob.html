<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What is your character? (7 Questions)🐾</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600;700&family=Itim&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* กำหนดค่าฟอนต์หลักของเว็บ */
        body {
            font-family: 'Anuphan', sans-serif;
            background-color: #fff5f6;
            background-image: radial-gradient(#ffe0e6 1.5px, transparent 1.5px), radial-gradient(#ffe0e6 1.5px, #fff5f6 1.5px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
        }

        /* ฟอนต์หัวข้อแบบน่ารักสดใส */
        .cute-title {
            font-family: 'Itim', cursive;
        }

        /* เอฟเฟกต์การเด้งเบา ๆ ของภาพการ์ดผลลัพธ์ */
        .card-bounce {
            animation: softBounce 3s infinite ease-in-out;
        }

        @keyframes softBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* ตกแต่งความโค้งมนและเงาของปุ่มตัวเลือก */
        .option-button {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .option-button:hover {
            transform: scale(1.02) translateY(-2px);
            box-shadow: 0 8px 16px rgba(255, 107, 129, 0.15);
        }
    </style>
</head>
<body class="min-height-screen flex justify-center items-center py-10 px-4">

    <div class="w-full max-w-lg bg-white rounded-3xl shadow-xl overflow-hidden border-4 border-pink-100 flex flex-col">
        
        <!-- หน้าแรก (Start Screen) -->
        <div id="start-screen" class="flex flex-col items-center">
            <!-- ภาพแบนเนอร์ด้านบนสุดของหน้าแรกตามความต้องการของคุณ -->
            <div class="w-full h-56 overflow-hidden bg-pink-50 relative border-b-4 border-pink-100">
                <img src="14.png" 
                     alt="ก๊วนสัตว์เลี้ยงแสนน่ารัก" 
                     class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"></div>
            </div>
            
            <div class="p-8 text-center flex flex-col items-center w-full">
                <h1 class="cute-title text-4xl text-pink-500 font-bold mb-4 tracking-wide">🐾 What is your Character? 🐾</h1>
                <p class="text-gray-600 text-lg leading-relaxed mb-8 px-2">
                    ยินดีต้อนรับสู่ PTtopia ดินแดนมหาสนุกที่เต็มไปด้วยความหลากหลาย 🌈 มาเล่นแบบทดสอบสนุก ๆ และค้นหาตัวตนของทุกคนไปพร้อมกัน!
                </p>
                <button onclick="startQuiz()" class="cute-title w-full bg-pink-400 hover:bg-pink-600 text-white text-2xl py-4 px-8 rounded-2xl shadow-lg hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1">
                    Start ✨
                </button>
            </div>
        </div>

        <!-- หน้าทำแบบทดสอบ (Quiz Screen) -->
        <div id="quiz-screen" class="hidden p-8 flex flex-col">
            <!-- ส่วนความคืบหน้า (Progress Bar) -->
            <div class="w-full bg-pink-50 rounded-full h-4 mb-8 overflow-hidden relative border border-pink-100">
                <div id="progress" class="bg-gradient-to-r from-pink-400 to-pink-500 h-full rounded-full transition-all duration-300" style="width: 0%;"></div>
            </div>
            
            <div class="flex justify-between items-center mb-6">
                <span id="question-number" class="cute-title text-xl text-pink-500 font-medium">คำถามที่ 1/7</span>
                <span class="text-gray-300"><i class="fa-solid fa-paw"></i></span>
            </div>

            <!-- ข้อความคำถาม -->
            <h2 id="question-text" class="text-xl md:text-2xl text-gray-800 font-semibold mb-8 leading-relaxed text-left">
                ข้อความคำถามจะปรากฏขึ้นที่นี่
            </h2>

            <!-- กลุ่มปุ่มตัวเลือก -->
            <div id="options-container" class="space-y-4 flex flex-col w-full mb-4">
                <!-- ตัวเลือกจะถูกสร้างขึ้นด้วย JavaScript -->
            </div>
        </div>

        <!-- หน้าแสดงผลลัพธ์ (Result Screen) -->
        <div id="result-screen" class="hidden p-8 flex flex-col items-center">
            
            <!-- ข้อความระบุผลลัพธ์ยินดีด้วยด้านบนสุด -->
            <h3 class="cute-title text-2xl text-pink-500 font-medium animate-pulse mb-2"> ✨Pick a Card คุณคือ...</h3>
            
            <!-- กล่องสี่เหลี่ยมมีชื่อของคาแรคเตอร์ผลลัพธ์ที่ได้ -->
            <div class="w-full bg-rose-50 border-2 border-rose-300 rounded-xl py-3 px-6 text-center mb-6 shadow-sm">
                <h2 id="result-title" class="cute-title text-2xl md:text-3xl text-pink-600 font-semibold">คาแรคเตอร์ผลลัพธ์</h2>
            </div>

            <!-- การ์ดภาพขนาดใหญ่พิเศษ (สัดส่วนแนวตั้ง ความยาวมากกว่าความกว้างอย่างสวยงาม) -->
            <div class="w-full bg-white rounded-2xl shadow-inner border border-gray-100 overflow-hidden p-0 bg-rose-50/10">
                <!-- ขยายความสูงของการ์ดเพื่อให้รูปแนวตั้งยาวพิเศษแสดงผลเด่นชัด ไม่ต้องห่วงเรื่องความกว้างด้วย object-contain -->
                <img id="result-card-image" 
                     src="" 
                     alt="Result Card" 
                     class="w-full h-auto rounded-xl shadow-md border border-gray-200/40 object-contain max-h-[500px] mx-auto card-bounce"
                     onerror="this.src='https://placehold.co/600x800/fff/ff6b81?text=สุนัขโกลเด้น🐕'">
            </div>

            <!-- ปุ่มแชร์และเล่นอีกครั้ง -->
            <div class="flex flex-col gap-3 pt-6 w-full">
                <button onclick="copyShareLink()" class="w-full bg-[#9575cd] hover:bg-[#673ab7] text-white font-medium py-3.5 px-6 rounded-xl text-lg shadow-md transition-all duration-200 transform hover:-translate-y-0.5 flex items-center justify-center gap-2">
                    copy to share 🔗
                </button>
                <button onclick="restartQuiz()" class="w-full bg-pink-500 hover:bg-pink-600 text-white font-medium py-3.5 px-6 rounded-xl text-lg shadow-md transition-all duration-200 transform hover:-translate-y-0.5">
                    play again 🔄
                </button>
            </div>
        </div>

    </div>

    <!-- กล่องแจ้งเตือนก๊อปปี้สำเร็จ (Custom Toast Alert) -->
    <div id="toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-gray-900/90 text-white px-6 py-3 rounded-full text-sm font-medium transition-all duration-300 opacity-0 pointer-events-none shadow-lg z-50 flex items-center gap-2">
        <span>คัดลอกลิงก์เรียบร้อยแล้ว! ส่งให้เพื่อนเล่นได้เลย 💕</span>
    </div>
    
    <script>
        // 1. คลังคำถาม 7 ข้อที่มีตัวเลือก 3 ช้อยส์ และกระจายคะแนนให้กับคาแรคเตอร์ต่าง ๆ โดยตรง
        const questions = [
            {
                question: "1. เมื่อคุณตื่นมาและพบว่าตัวเองตื่นสายตั้งแต่วันแรกของการเปิดเรียน คุณจะ…",
                options: [
                    { text: "โบกพี่วินมอเตอร์ไซค์ แล้วบอกขอแว้นๆ เลยนะพี่ เราจะขาดเรียนวันแรกไม่ได้!", scores: { rabbit: 3, snake: 2, gazelle: 1 } },
                    { text: "จังหวะนี้ต้องวิ่งแล้ว! ฉายานักกีฬาทีมชาติไม่ได้มาเล่นๆ", scores: { tiger: 3, buff: 3, fox: 1 } },
                    { text: "ช่างมัน… ขอนอนต่อแล้วกัน เพราะการนอนสำคัญที่สุด!", scores: { sloth: 3, fox: 2, gazelle: 1 } }
                ]
            },
            {
                question: "2. วันหยุดสุดสัปดาห์นี้ ถ้าไม่มีแพลนใดๆ คุณอยากทำอะไรมากที่สุด?",
                options: [
                    { text: "เที่ยวให้สนุกสุดๆ แล้วหยุดที่สลบบนเตียง", scores: { snake: 3, gazelle: 3, tiger: 1 } },
                    { text: "นอนอ่านหนังสือ ดูหนัง ฟังเพลง อยู่ห้องชิลๆ แล้วกัน", scores: { sloth: 3, rabbit: 2, buff: 1 } },
                    { text: "ชวนบุ๋ยไปเต้นแอโรบิก ออกกำลังกายที่สวนลุมฯ", scores: {buff: 3, rabbit: 2, snake: 1 } }
                ]
            },
            {
                question: "3. เมื่อคุณเห็นบุ๋ยกำลังเดินขึ้นจากสระน้ำต่อหน้าคุณ คุณจะ…?",
                options: [
                    { text: "เดินหนีเท่านั้น! ขออนุญาตสับเท้าอย่างไว", scores: { sloth: 3, tiger: 2, buff: 3 } },
                    { text: "เข้าไปทักทาย เซย์ไฮ ขอเซลฟี่สักหน่อย", scores: { gazelle: 3, fox: 2, snake: 1 } },
                    { text: "ยกมือขอพรให้ได้เกรด A สายมูต้องเข้าแล้ว!", scores: { snake: 3, rabbit: 2, gazelle: 1 } }
                ]
            },
            {
                question: "4. เมื่อต้องเข้าสังคมและเจอผู้คนใหม่ๆ คุณมักจะ…",
                options: [
                    { text: "เป็นคนเปิดบทสนทนา ชวนคุยทำความรู้จักอย่างเป็นกันเอง", scores: { gazelle: 3, fox: 2, snake: 2 } },
                    { text: "นั่งนิ่งๆ เงียบๆ ท่องไว้ว่า...ต้องไม่มีใครเห็นฉัน!", scores: { sloth: 3, buff: 2, tiger: 1 } },
                    { text: "นั่งรอคนมาทัก โปรดเก็บฉันไปเลี้ยงดูด้วยนะ!", scores: { rabbit: 3, tiger: 2, snake: 1 } }
                ]
            },
            {
                question: "5. ถ้าเพื่อนสนิทของคุณกำลังอกหัก คุณจะทำอย่างไร?",
                options: [
                    { text: "รับฟัง คอยอยู่ข้างๆ กอดปลอบและให้กำลังใจ", scores: { sloth: 1, snake: 3, fox: 3 } },
                    { text: "เสิร์ชหา'ของกินอร่อยใกล้ฉัน' แล้วพาตะลุยกินให้กระจุย! ", scores: { tiger: 3, gazelle: 2, rabbit: 1 } },
                    { text: "พาไปงานรักแรกพบ เผื่อจะได้พบรักแรก?", scores: { rabbit: 3, fox: 2, buff: 1 } }
                ]
            },
            {
                question: "6. สำหรับคุณแล้ว 'รักแรกพบ' แท้จริงเป็นอย่างไรกันนะ…",
                options: [
                    { text: "ตอบไม่ได้เหมือนกัน เพราะยังไม่เคยเจอใครที่เป็นรักแรกพบเลย", scores: { buff: 3, rabbit: 2, sloth: 1 } },
                    { text: "เพราะเธอใช่หรือไม่ เปิดใจใครที่ฉันเป็น~", scores: { gazelle: 3, fox: 2, tiger: 2 } },
                    { text: " ก็เป็นกิจกรรมต้อนรับน้องๆ เข้าสู่คณะกายภาพบำบัดไงล่ะ!", scores: { rabbit: 3, fox: 2, snake: 1 } }
                ]
            },
            {
                question: "7. ถ้าต้องไปงาน รักแรกพบ x Pink Day ในธีม Zootopia คุณจะแต่งตัวอย่างไร?",
                options: [
                    { text: "ใส่ชุดธรรมดาตาม Dress Code ที่กำหนดไว้", scores: { rabbit: 3, fox: 2, sloth: 1 } },
                    { text: "ธรรมดาได้ที่ไหน! แต่งจัดเต็มแบบครบเครื่อง เสื้อผ้าหน้าผมต้องเป๊ะ! ", scores: { gazelle: 3, snake: 3, fox: 2 } },
                    { text: "ชุดนักศึกษาแบบเซฟๆ ไว้ก่อน", scores: { sloth: 3, buff: 3, tiger: 1 } }
                ]
            }
        ];

        // 2. ข้อมูลผลลัพธ์ 7 คาแรคเตอร์หลักที่สมบูรณ์แบบ
        const characters = {
            tiger: {
                title: "Cheetah-Duck 🐯🐾",
                img: "imagework/9.png"
            },
            sloth: {
                title: "Sloth-Duck 🦥🐾",
                img: "imagework/11.png"
            },
            snake: {
                title: "Snake-Duck 🐍💥",
                img: "imagework/13.png"
            },
            gazelle: {
                title: "Gazelle-Duck 🦌🪩",
                img: "imagework/10.png"
            },
            rabbit: {
                title: "Rabbit-Duck 🐰🥕 ",
                img: "imagework/7.png"
            },
            fox: {
                title: "Fox-Duck 🦊🕶️",
                img: "imagework/8.png"
            },
            buff: {
                title: "Buffalo-Duck 🐃💥",
                img: "imagework/12.png"
            }
        };

        // สถานะของเกม (คะแนนและข้อ)
        let currentQuestionIndex = 0;
        let charScores = {
            tiger: 0,
            sloth: 0,
            gazelle: 0,
            rabbit: 0,
            fox: 0,
            buff: 0,
            snake:0
        };

        // ฟังก์ชันเริ่มต้นทำแบบทดสอบ
        function startQuiz() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            showQuestion();
        }

        // ฟังก์ชันแสดงคำถามปัจจุบัน
        function showQuestion() {
            // คำนวณเปอร์เซ็นต์ความคืบหน้า
            const progressPercent = (currentQuestionIndex / questions.length) * 100;
            document.getElementById('progress').style.width = `${progressPercent}%`;

            // ดึงข้อความคำถาม
            const currentQuestion = questions[currentQuestionIndex];
            document.getElementById('question-number').innerText = `คำถามที่ ${currentQuestionIndex + 1}/${questions.length}`;
            document.getElementById('question-text').innerText = currentQuestion.question;

            // ล้างข้อมูลตัวเลือกเดิมและแสดงปุ่มตัวเลือกใหม่
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';

            currentQuestion.options.forEach((option) => {
                const button = document.createElement('button');
                button.innerText = option.text;
                button.className = "option-button w-full bg-pink-50 hover:bg-rose-100 border-2 border-pink-100 hover:border-pink-300 text-gray-700 text-lg py-4 px-6 rounded-2xl text-left font-medium transition-all duration-200";
                button.onclick = () => selectOption(option.scores);
                optionsContainer.appendChild(button);
            });
        }

        // ฟังก์ชันบันทึกตัวเลือกและเปลี่ยนข้อถัดไป
        function selectOption(scoresToAdd) {
            // บวกคะแนนให้แต่ละคาแรคเตอร์ตามน้ำหนักในออปชันที่เลือก
            for (let charKey in scoresToAdd) {
                if (charScores.hasOwnProperty(charKey)) {
                    charScores[charKey] += scoresToAdd[charKey];
                }
            }

            currentQuestionIndex++;

            if (currentQuestionIndex < questions.length) {
                showQuestion();
            } else {
                calculateResult();
            }
        }

        // ฟังก์ชันคำนวณประมวลผลลัพธ์
        function calculateResult() {
            // โหลดหลอดความคืบหน้าให้เต็มก่อนเปลี่ยนหน้าเพื่อความประณีต
            document.getElementById('progress').style.width = '100%';

            setTimeout(() => {
                document.getElementById('quiz-screen').classList.add('hidden');
                document.getElementById('result-screen').classList.remove('hidden');

                // ค้นหาคาแรคเตอร์ที่ได้คะแนนสะสมสูงสุด
                let maxScore = -1;
                let matchedCharacterKey = 'rabbit'; // ค่า Default เผื่อเกิดกรณีก้ำกึ่งมาก
                
                // คีย์สำหรับเรียงลำดับความสำคัญ (Priority) กรณีคะแนนเสมอกัน
                const priorityOrder = ['rabbit', 'fox', 'tiger', 'gazelle', 'sloth', 'buff', 'snake'];

                for (let key of priorityOrder) {
                    if (charScores[key] > maxScore) {
                        maxScore = charScores[key];
                        matchedCharacterKey = key;
                    }
                }

                // ดึงข้อมูลคาแรคเตอร์ที่ถูกต้องมาแสดงผล
                const matchedCharacter = characters[matchedCharacterKey];

                // เรนเดอร์ข้อมูลขึ้นบน UI ตามโครงสร้างที่คุณต้องการ
                document.getElementById('result-title').innerText = matchedCharacter.title;
                document.getElementById('result-card-image').src = matchedCharacter.img;
            }, 300);
        }

        // ฟังก์ชันคัดลอกลิงก์เพื่อแชร์
        function copyShareLink() {
            const dummyInput = document.createElement('textarea');
            dummyInput.value = window.location.href;
            document.body.appendChild(dummyInput);
            dummyInput.select();
            
            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showToastNotification();
                } else {
                    console.error("ไม่สามารถคัดลอกได้อัตโนมัติ");
                }
            } catch (err) {
                console.error("เกิดข้อผิดพลาดในการคัดลอก: ", err);
            }
            document.body.removeChild(dummyInput);
        }

        // ฟังก์ชันแสดงกล่องแจ้งเตือน Toast
        function showToastNotification() {
            const toast = document.getElementById('toast');
            toast.classList.remove('opacity-0', 'pointer-events-none');
            toast.classList.add('opacity-100');
            
            setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0', 'pointer-events-none');
            }, 2500);
        }

        // ฟังก์ชันรีเซ็ตค่าเพื่อกลับไปเริ่มใหม่
        function restartQuiz() {
            currentQuestionIndex = 0;
            // รีเซ็ตคะแนนทั้งหมดกลับเป็น 0
            charScores = {
                tiger: 0,
                sloth: 0,
                gazelle: 0,
                rabbit: 0,
                fox: 0,
                buff: 0,
                snake:0
            };
            document.getElementById('progress').style.width = '0%';
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
